# Runs only tests impacted by the PR's changes (dogfoods pytest-impacted).

name: CI (impacted)

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        version: "latest"
    - name: Install ruff
      uses: astral-sh/ruff-action@v3
      with:
        version: "latest"
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install the project
      run: uv sync --all-extras --dev
    - name: Run ruff lint and formatting checks
      run: |
        ruff check
        ruff format
    - name: Run mypy
      run: |
        uv run mypy pytest_impacted
    - name: Run impacted tests
      run: >
        uv run pytest
        --impacted
        --impacted-module pytest_impacted
        --impacted-git-mode branch
        --impacted-base-branch origin/${{ github.base_ref }}
        --impacted-tests-dir tests
