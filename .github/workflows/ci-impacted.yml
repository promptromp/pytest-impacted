# Runs only tests impacted by the PR's changes (dogfoods pytest-impacted).

name: CI (impacted)

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v8.0.0
      with:
        python-version: "3.13"
        version: "latest"
        enable-cache: true
    - name: Install the project
      run: uv sync --all-extras --dev
    - name: Run ruff lint and formatting checks
      run: |
        uv run ruff check
        uv run ruff format --check
    - name: Run mypy
      run: uv run mypy pytest_impacted

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        backend: ["python", "fast"]

    name: test (${{ matrix.python-version }}, ${{ matrix.backend }})
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v8.0.0
      with:
        python-version: ${{ matrix.python-version }}
        version: "latest"
        enable-cache: true
    - name: Install the project (python backend)
      if: matrix.backend == 'python'
      run: uv sync --dev
    - name: Install the project (fast/Rust backend)
      if: matrix.backend == 'fast'
      run: uv sync --all-extras --dev
    - name: Run impacted tests
      run: >
        uv run pytest
        --impacted
        --impacted-module pytest_impacted
        --impacted-git-mode branch
        --impacted-base-branch origin/${{ github.base_ref }}
        --impacted-tests-dir tests
